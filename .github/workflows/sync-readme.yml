name: Sync README from manual

# Once a day, regenerate the region between the MANUAL markers in README.md from the bundled
# in-app manual, so the GitHub front page stays in step with the app without manual effort.
on:
  schedule:
    - cron: '0 6 * * *'      # 06:00 UTC daily
  workflow_dispatch:          # allow a manual run too

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild README manual section
        run: |
          manual="app/src/main/assets/user_manual.md"
          awk -v manual="$manual" '
            $0 ~ /<!-- MANUAL:START -->/ {
              print
              while ((getline line < manual) > 0) print line
              skip = 1
              next
            }
            $0 ~ /<!-- MANUAL:END -->/ { skip = 0; print; next }
            !skip { print }
          ' README.md > README.new
          mv README.new README.md

      - name: Commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "README already in sync."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs: sync README from user manual [skip ci]"
            git push
          fi
